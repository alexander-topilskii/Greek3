name: Agent Auto-merge

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: agent-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    if: |
      startsWith(github.head_ref, 'cursor/') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.merged || pr.state !== 'open') {
              core.info('PR is not open — skipping auto-merge.');
              return;
            }

            const { owner, repo } = context.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function autoMergeEnabled() {
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      autoMergeRequest { enabledAt }
                    }
                  }
                }`,
                { owner, repo, number: pr.number }
              );
              return Boolean(repository.pullRequest.autoMergeRequest);
            }

            if (await autoMergeEnabled()) {
              core.info('Auto-merge already enabled.');
              return;
            }

            const mutation = `mutation($prId: ID!) {
              enablePullRequestAutoMerge(input: {
                pullRequestId: $prId,
                mergeMethod: MERGE
              }) {
                pullRequest {
                  autoMergeRequest { enabledAt }
                }
              }
            }`;

            // Let GitHub register pending required checks before the first attempt.
            await sleep(2000);

            for (let attempt = 1; attempt <= 8; attempt++) {
              try {
                await github.graphql(mutation, { prId: pr.node_id });
                core.info('Auto-merge enabled.');
                return;
              } catch (error) {
                const message = String(error?.message || error);
                if (message.includes('clean status')) {
                  core.info('PR is already mergeable — approve job will merge if needed.');
                  return;
                }
                if (message.includes('unstable status') && attempt < 8) {
                  core.info(`PR unstable, retry ${attempt}/8…`);
                  await sleep(attempt * 2000);
                  continue;
                }
                if (message.includes('unstable status')) {
                  core.info('Could not enable auto-merge — approve job will merge if needed.');
                  return;
                }
                throw error;
              }
            }
