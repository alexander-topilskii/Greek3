name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build:site
        env:
          SITE_BASE_URL: /${{ github.event.repository.name }}
          BUILD_ID: ${{ github.sha }}

  approve:
    needs: build
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'cursor/') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Approve and merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.merged || pr.state !== 'open') {
              core.info('PR is not open — skipping.');
              return;
            }

            const { owner, repo } = context.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function autoMergeEnabled() {
              const { repository } = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      autoMergeRequest { enabledAt }
                    }
                  }
                }`,
                { owner, repo, number: pr.number }
              );
              return Boolean(repository.pullRequest.autoMergeRequest);
            }

            async function getPullRequest() {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });
              return data;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pr.number,
            });
            const alreadyApproved = reviews.some(
              (review) => review.user?.login === 'github-actions[bot]' && review.state === 'APPROVED'
            );

            if (!alreadyApproved) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: 'CI passed — merging Cursor agent PR.',
              });
              core.info('PR approved.');
            } else {
              core.info('PR already approved by github-actions[bot].');
            }

            // mergeable_state often stays "unstable" while this job is running
            // (especially if approve/enable-automerge are required checks).
            // Use the merge API with retries instead of waiting for "clean".
            for (let attempt = 1; attempt <= 24; attempt++) {
              const current = await getPullRequest();
              if (current.merged) {
                core.info('PR already merged.');
                return;
              }
              if (await autoMergeEnabled()) {
                core.info('Auto-merge enabled — GitHub will merge when ready.');
                return;
              }

              try {
                const { data: result } = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
                if (result.merged) {
                  core.info('Merged PR directly.');
                  await github.rest.actions.createWorkflowDispatch({
                    owner,
                    repo,
                    workflow_id: 'deploy.yml',
                    ref: 'main',
                  });
                  core.info('Triggered deploy workflow.');
                  return;
                }
              } catch (error) {
                const status = error.status;
                const message = String(error.message || error);
                if (status === 405 || status === 409 || message.includes('not mergeable')) {
                  core.info(`Merge not ready (${attempt}/24), retrying…`);
                  await sleep(5000);
                  continue;
                }
                throw error;
              }
            }

            core.warning('Could not merge PR after retries. Manual merge may be required.');
