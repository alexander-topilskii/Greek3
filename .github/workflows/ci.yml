name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build:site
        env:
          SITE_BASE_URL: /${{ github.event.repository.name }}
          BUILD_ID: ${{ github.sha }}

  enable-automerge:
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'cursor/') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.merged || pr.state !== 'open') {
              core.info('PR is not open — skipping auto-merge.');
              return;
            }

            const { owner, repo } = context.repo;

            const { repository } = await github.graphql(
              `query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    autoMergeRequest { enabledAt }
                  }
                }
              }`,
              { owner, repo, number: pr.number }
            );

            if (repository.pullRequest.autoMergeRequest) {
              core.info('Auto-merge already enabled.');
              return;
            }

            const mutation = `mutation($prId: ID!) {
              enablePullRequestAutoMerge(input: {
                pullRequestId: $prId,
                mergeMethod: MERGE
              }) {
                pullRequest {
                  autoMergeRequest { enabledAt }
                }
              }
            }`;

            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                await github.graphql(mutation, { prId: pr.node_id });
                core.info('Auto-merge enabled.');
                return;
              } catch (error) {
                const message = String(error?.message || error);
                if (message.includes('clean status')) {
                  core.info('PR is already mergeable — auto-merge not required.');
                  return;
                }
                if (message.includes('unstable status') && attempt < 5) {
                  core.info(`PR unstable, retry ${attempt}/5…`);
                  await new Promise((resolve) => setTimeout(resolve, attempt * 3000));
                  continue;
                }
                throw error;
              }
            }

  approve:
    needs: build
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'cursor/') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Approve PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.merged || pr.state !== 'open') {
              core.info('PR is not open — skipping approve.');
              return;
            }

            const { owner, repo } = context.repo;

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pr.number,
            });
            const alreadyApproved = reviews.some(
              (review) => review.user?.login === 'github-actions[bot]' && review.state === 'APPROVED'
            );

            if (alreadyApproved) {
              core.info('PR already approved by github-actions[bot].');
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'CI passed — auto-merge enabled for Cursor agent PR.',
            });
